# AddHeads
# Author: goshkow

# Main features.
chat: true
placeholder: true

# Default player-list head injection.
# Keep this enabled if you want AddHeads to prepend the head automatically to the player list name.
tab:
  enabled: true

# Shared refresh interval for skins, cache, and player-list head reapplication.
cache-refresh-interval-seconds: 60

# Head spacing.
formatting:
  # Amount of invisible spacing symbols after the built-in chat head. 0 disables the offset.
  chat-head-spacing: 2
  # Keep enabled unless you want the head to use vanilla text shadow in chat.
  chat-head-shadow: true
  # Amount of invisible spacing symbols after the built-in tab head. 0 disables the offset.
  tab-head-spacing: 2
  # Recommended: false. Disabling the shadow makes the player-list head look more vanilla.
  tab-head-shadow: false

# Language file from plugins/AddHeads/languages/.
language:
  file: en-us.yml

# Prefix used in plugin messages.
messages:
  prefix: "&b[AddHeads] &r"

# Update checker.
update-check:
  enabled: true
  interval-hours: 6

# Premium defaults.
premium:
  enabled: false
  # auto -> session/UUID, permission -> permission only, auto_permission -> permission first then auto detection.
  mode: auto_permission
  permission: addhead.premium
  disable-chat-heads: false
  disable-tab-heads: true

# General notes.
# - tab.enabled controls the automatic player-list head injection.
# - cache-refresh-interval-seconds controls both the skin cache refresh and the built-in head reapply cycle.
# - formatting.* controls the spacing amount and shadow applied to built-in chat and player-list heads.
# - %addhead_head% is for chat and component-aware plugins.
# - %addhead_tab% is optional and mainly useful for custom PlaceholderAPI-based layouts.
# - The default player-list head path does not require placeholders; it prefers ProtocolLib viewer rendering and falls back to Paper's playerListName(Component) API.
# - If TAB is installed and tab.enabled is true, AddHeads switches to TAB's own API path automatically instead of fighting TAB's display-name guard.
# - Missing config keys are backfilled from the bundled template on reload.
# - Update notices are sent in English to admins with addhead.settings or addhead.reload.
