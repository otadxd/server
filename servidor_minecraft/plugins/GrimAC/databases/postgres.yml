# ===========================================================================
#  Postgres backend settings.
#
#  Postgres supports multi-server deployments (several Grim instances
#  writing into one central DB). Requires the Postgres JDBC driver at
#  runtime; if the driver is missing the backend disables itself at
#  startup and routing that targeted this backend falls back.
# ===========================================================================

# Every key lives under `postgres:` so this file's keyspace doesn't collide
# with sibling per-backend files when Configuralize merges them all into
# one global namespace.
postgres:
  host: "localhost"
  port: 5432
  database: "grim"
  user: "postgres"
  password: ""

  # HikariCP connection pool settings. These only apply to SQL backends
  # that use Hikari internally.
  pool-settings:
    # Maximum physical database connections this Grim instance can keep open.
    maximum-pool-size: 5
    # Minimum idle connections kept warm. Keep equal to maximum-pool-size
    # for a fixed-size pool, or lower it if your database has tight limits.
    minimum-idle: 5
    # Retire connections after this many milliseconds. 1800000 is Hikari's
    # default 30 minutes; use 0 only if your database/proxy handles lifetime.
    maximum-lifetime-ms: 1800000
    # Periodically ping idle connections. 0 disables keepalive.
    keepalive-time-ms: 0
    # Maximum time to wait for a connection from the pool before failing.
    connection-timeout-ms: 5000

  # Extra URL parameters appended after `?`. Leave empty unless you know
  # you need something specific.
  extra-jdbc-params: ""

  batch-flush-cap: 256

  # Table-name overrides. Default names below.
  tables:
    meta: grim_meta
    checks: grim_checks
    players: grim_players
    sessions: grim_sessions
    violations: grim_violations
    settings: grim_settings

# Schema markers — see header comment in config.yml.
config-flavor: V2
config-version: 2
